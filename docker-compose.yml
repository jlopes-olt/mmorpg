version: "3.9"

services:
  mmorpg:
    container_name: mmorpg
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Tant que le profil "https" (service caddy ci-dessous) n'est pas activé,
      # le port reste public comme avant — accès direct http://ip:3000.
      # Le jour où vous activez Caddy (nom de domaine prêt), repassez cette
      # ligne en "127.0.0.1:${APP_PORT:-3000}:3000" pour forcer tout le trafic
      # externe à passer par HTTPS (nécessaire pour Service Worker / notifications push).
      - "${APP_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DB_FILE: /app/server/data/wildrift.db
      # Ancien format JSON : encore lu une fois pour la migration automatique
      STATE_FILE: /app/server/data/state.json
      # Filet de secours admin (pseudos séparés par des virgules) : sans cette
      # ligne, une variable ADMIN_USERNAMES positionnée dans Portainer/.env
      # n'atteint jamais le conteneur — Compose ne relaie que ce qui est listé
      # ici, il ne transmet pas automatiquement les variables de la stack.
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      # OTP par email (Resend) : même remarque — sans ces deux lignes, les
      # variables positionnées dans Portainer/.env n'atteignent jamais le
      # conteneur, et le code reste en mode de repli (code affiché à l'écran,
      # jamais envoyé par email) même une fois la clé API et le domaine prêts.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      # Paiements (Stripe) : même remarque — sans ces lignes, les variables
      # positionnées dans Portainer/.env n'atteignent jamais le conteneur.
      # Liens de paiement pré-créés (montants fixes, voir buildCheckoutLink) :
      # aucune session Stripe n'est créée dynamiquement, donc STRIPE_SECRET_KEY
      # ne sert qu'à vérifier la signature du webhook, jamais un appel API.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PAYMENT_LINK_SMALL: ${STRIPE_PAYMENT_LINK_SMALL:-}
      STRIPE_PAYMENT_LINK_MEDIUM: ${STRIPE_PAYMENT_LINK_MEDIUM:-}
      STRIPE_PAYMENT_LINK_LARGE: ${STRIPE_PAYMENT_LINK_LARGE:-}
    volumes:
      - mmorpg_state:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - default
      # Réseau partagé avec le Caddy d'un AUTRE stack déjà en place sur ce VPS
      # (ports 80/443 déjà occupés par lui) : plutôt que d'activer le service
      # "caddy" ci-dessous (qui entrerait en conflit), on rejoint ce réseau pour
      # que cet autre Caddy puisse faire `reverse_proxy mmorpg:3000` vers ce
      # conteneur. Réseau créé une fois manuellement : `docker network create
      # shared_proxy` sur le VPS — external:true ci-dessous ne fait que le
      # rejoindre, jamais le créer/détruire depuis ce stack.
      - shared_proxy

  # Optionnel, désactivé par défaut : reverse proxy HTTPS (Let's Encrypt automatique).
  # Ne démarre PAS avec un simple "docker compose up" — il faut activer le profil
  # explicitement une fois le nom de domaine prêt :
  #   docker compose --profile https up -d --build
  # (ou définir COMPOSE_PROFILES=https dans les variables d'environnement du stack Portainer).
  # Sans ça, aucun risque que ce service bloque le déploiement actuel en HTTP simple.
  caddy:
    image: caddy:2-alpine
    container_name: mmorpg_caddy
    profiles: ["https"]
    depends_on:
      - mmorpg
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Nom de domaine pointé vers l'IP publique du VPS (ex. feralia.exemple.com).
      # À définir dans Portainer/.env — même remarque que pour ADMIN_USERNAMES ci-dessus.
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  mmorpg_state:
  caddy_data:
  caddy_config:

networks:
  default: {}
  shared_proxy:
    name: shared_proxy
    external: true
