version: "3.9"

services:
  mmorpg:
    container_name: mmorpg
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      PORT: 3000
      STATE_FILE: /app/server/data/state.json
    volumes:
      - mmorpg_state:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mmorpg_state:
