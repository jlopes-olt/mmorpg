version: "3.9"

services:
  mmorpg:
    container_name: mmorpg
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DB_FILE: /app/server/data/wildrift.db
      # Ancien format JSON : encore lu une fois pour la migration automatique
      STATE_FILE: /app/server/data/state.json
      # Filet de secours admin (pseudos séparés par des virgules) : sans cette
      # ligne, une variable ADMIN_USERNAMES positionnée dans Portainer/.env
      # n'atteint jamais le conteneur — Compose ne relaie que ce qui est listé
      # ici, il ne transmet pas automatiquement les variables de la stack.
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
    volumes:
      - mmorpg_state:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mmorpg_state:
