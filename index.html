<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#14181d">
  <meta name="application-name" content="FERALIA Online">
  <meta name="apple-mobile-web-app-title" content="FERALIA Online">
  <title>FERALIA Online</title>
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/style.css?v=20260719-tile-ux-castle-cost-1">
</head>
<body>
  <div id="app">
    <div id="splash">
      <div class="splash-inner">
        <img class="splash-logo" src="assets/feralia_online_logo.png" alt="FERALIA Online">
      </div>
    </div>

    <canvas id="map"></canvas>

    <!-- HUD supérieur : PV, PA (+ cooldown), position -->
    <header id="hud">
      <div class="hud-panel hp-panel">
        <div class="hud-panel-head">
          <span class="hud-label">Vitalité</span>
          <div class="hud-meta pos" id="posText">(0, 0)</div>
        </div>
        <div class="bar hp"><div class="bar-fill" id="hpFill"></div><span class="bar-text" id="hpText"></span></div>
      </div>
      <div class="hud-panel pa-panel">
        <div class="hud-panel-head">
          <span class="hud-label">Endurance</span>
          <div class="hud-meta pa-next" id="paNext"></div>
        </div>
        <div class="bar pa"><div class="bar-fill" id="paFill"></div><span class="bar-text" id="paText"></span></div>
      </div>
      <div id="installBanner" class="hidden">
        <img id="installBannerIcon" src="assets/icons/icon-192.png" alt="">
        <div class="install-banner-copy">
          <div class="install-banner-title">Installer FERALIA Online</div>
          <div class="install-banner-text" id="installBannerText"></div>
        </div>
        <button id="installBannerAction" class="btn primary hidden">Installer</button>
        <button id="installBannerClose" aria-label="Fermer">✕</button>
      </div>
    </header>

    <div id="dungeonBanner" class="hidden">
      <div class="dungeon-banner-head">
        <div class="dungeon-banner-boss">
          <img id="dungeonBannerBossIcon" class="dungeon-banner-boss-icon" alt="">
        </div>
        <div class="dungeon-banner-copy">
          <div class="dungeon-banner-kicker">Donjon</div>
          <div class="dungeon-banner-title" id="dungeonBannerTitle"></div>
        </div>
      </div>
      <div class="dungeon-banner-progress-row">
        <div class="dungeon-banner-track"><div class="dungeon-banner-fill" id="dungeonBannerFill"></div></div>
        <div class="dungeon-banner-count" id="dungeonBannerCount"></div>
      </div>
      <div class="dungeon-banner-hint" id="dungeonBannerHint"></div>
    </div>

    <div id="lobbyBanner" class="hidden">
      <span id="lobbyText"></span>
      <span id="lobbyChance" class="hidden"></span>
      <button id="lobbyStart" class="hidden">⚡ Lancer le combat maintenant</button>
    </div>
    <div id="toasts"></div>

    <!-- Action contextuelle : visible uniquement sur la case (0,0) -->
    <button id="ctxAction" class="hidden">⚒ Capitale — PNJ &amp; Forgeron</button>

    <!-- Buff de nourriture actif -->
    <div id="buffBadge" class="hidden"></div>

    <!-- Bottom sheet (Inventaire / Profil / Carte / Social / Capitale) -->
    <section id="sheet" class="hidden">
      <div id="sheetHead">
        <h2 id="sheetTitle"></h2>
        <button id="sheetClose" aria-label="Fermer">✕</button>
      </div>
      <div id="sheetBody"></div>
    </section>

    <!-- HUD inférieur : 4 boutons larges, tactile first -->
    <nav id="nav">
      <button data-panel="inventory"><span class="ico nav-ico nav-ico-inventory" aria-hidden="true"></span><span>Inventaire</span></button>
      <button data-panel="shop"><span class="ico nav-ico nav-ico-shop" aria-hidden="true"></span><span>Boutique</span></button>
      <button data-panel="profile"><span class="ico nav-ico nav-ico-profile" aria-hidden="true"></span><span>Profil</span></button>
      <button data-panel="map"><span class="ico nav-ico nav-ico-map" aria-hidden="true"></span><span>Carte</span></button>
      <button data-panel="social"><span class="ico nav-ico nav-ico-social" aria-hidden="true"></span><span class="nav-badge hidden" id="socialNavBadge"></span><span>Social</span></button>
    </nav>

    <!-- Pop-ups contextuelles (récolte, raid, résultats) -->
    <div id="popup" class="hidden"></div>
    <div id="combatFx" class="hidden"></div>
    <div id="harvestFx" class="hidden"></div>

    <!-- Création de personnage -->
    <div id="creation" class="overlay hidden"></div>

    <!-- Panneau DEV : accélération du temps pour tester le greybox -->
    <button id="devBtn" class="hidden" aria-label="Panneau développeur">⚙</button>
    <div id="devPanel" class="hidden">
      <b>DEV</b>
      <div class="dev-row">
        <button data-speed="1" class="active">x1</button>
        <button data-speed="10">x10</button>
        <button data-speed="60">x60</button>
      </div>
      <button id="devPa">+50 PA</button>
      <button id="devReveal">Révéler la carte</button>
      <button id="devResourceReset">🌱 Redistribuer faune &amp; ressources</button>
      <button id="devReset" class="danger">Réinitialiser</button>
    </div>
  </div>

  <!-- Fourni par le backend Node ; échoue silencieusement en local pur
       (file:// / artifact) et le jeu bascule alors en simulation solo. -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/config.js?v=20260719-tile-ux-castle-cost-1"></script>
  <script src="js/world.js?v=20260719-tile-ux-castle-cost-1"></script>
  <script src="js/server.js?v=20260719-tile-ux-castle-cost-1"></script>
  <script src="js/net.js?v=20260719-tile-ux-castle-cost-1"></script>
  <script src="js/render.js?v=20260719-tile-ux-castle-cost-1"></script>
  <script src="js/ui.js?v=20260719-tile-ux-castle-cost-1"></script>
  <script src="js/main.js?v=20260719-tile-ux-castle-cost-1"></script>
</body>
</html>
